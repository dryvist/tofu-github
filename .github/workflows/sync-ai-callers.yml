# Commit the AI caller workflows (config/workflows/*.yml) into each opted-in repo.
#
# This is the ONLY part of the AI rollout that isn't native Terraform: labels and
# per-repo params are github_issue_label / github_actions_variable (labels.tf,
# ai-variables.tf). But landing a file on a protected default branch needs a PR
# (org_branch_protection requires one, with zero bypass actors), and the GitHub
# provider has no github_pull_request resource — so this Action opens + merges it.
#
# Per opted-in repo (config/ai-callers.yml): bake ci_workflow_name into ai-ci.yml's
# workflow_run trigger, commit the 4 callers + remove legacy callers via
# createCommitOnBranch (web-flow signed -> verified, satisfies required_signatures
# on the branch), open a PR, and admin-merge only when auto_merge=true.
name: Sync AI Callers

on:
  workflow_dispatch:
    inputs:
      auto_merge:
        description: "Admin-merge the per-repo PRs (false = open for review only)"
        type: boolean
        default: false
      only_repo:
        description: "Limit to a single repo (blank = all opted-in)"
        type: string
        default: ""
  push:
    branches: [main]
    paths:
      - "config/ai-callers.yml"
      - "config/workflows/**"
      - ".github/workflows/sync-ai-callers.yml"

permissions:
  contents: read

concurrency:
  group: sync-ai-callers
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Config to JSON
        run: yq -o=json config/ai-callers.yml > "$RUNNER_TEMP/ai.json"

      - name: Sync caller workflows
        uses: actions/github-script@v9
        env:
          AUTO_MERGE: ${{ inputs.auto_merge }}
          ONLY_REPO: ${{ inputs.only_repo }}
          CONFIG_JSON: ${{ runner.temp }}/ai.json
        with:
          github-token: ${{ secrets.GH_PAT_ORG_ADMIN }}
          script: |
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync(process.env.CONFIG_JSON, 'utf8'));
            const owner = context.repo.owner;
            const autoMerge = process.env.AUTO_MERGE === 'true';
            const onlyRepo = process.env.ONLY_REPO || '';
            const srcDir = 'config/workflows';
            const files = fs.readdirSync(srcDir).filter((f) => f.endsWith('.yml'));
            const legacy = ['.github/workflows/ci-fix.yml', '.github/workflows/ci-fail-issue.yml'];
            const branch = 'chore/sync-ai-callers';

            // ai-ci.yml is the only file with a per-repo literal: workflow_run can't
            // read repo variables, so the CI workflow name is baked in here. Every
            // other param reaches the callers as repo Actions variables (AI_*).
            const render = (name, body, repoCfg) =>
              name === 'ai-ci.yml' ? body.split('$CI_WORKFLOW_NAME').join(repoCfg.ci_workflow_name) : body;

            for (const [repo, repoCfg] of Object.entries(cfg.repos)) {
              if (onlyRepo && repo !== onlyRepo) continue;
              core.startGroup(`${owner}/${repo}`);

              const desired = files.map((f) => ({
                path: `.github/workflows/${f}`,
                contents: Buffer.from(render(f, fs.readFileSync(`${srcDir}/${f}`, 'utf8'), repoCfg)).toString('base64'),
              }));

              const base = (await github.rest.repos.get({ owner, repo })).data.default_branch;

              // Only commit files that actually differ — avoids empty PRs.
              const additions = [];
              for (const a of desired) {
                let current = null;
                try {
                  current = (await github.rest.repos.getContent({ owner, repo, path: a.path, ref: base })).data.content.replace(/\n/g, '');
                } catch { /* new file */ }
                if (current !== a.contents) additions.push(a);
              }
              const deletions = [];
              for (const lf of legacy) {
                try { await github.rest.repos.getContent({ owner, repo, path: lf, ref: base }); deletions.push({ path: lf }); }
                catch { /* absent */ }
              }
              if (additions.length === 0 && deletions.length === 0) { core.info('up to date'); core.endGroup(); continue; }

              // Reset the sync branch to the current default head, then make one
              // verified commit on it (createCommitOnBranch is web-flow signed, so
              // required_signatures — which covers all branches — is satisfied).
              const headOid = (await github.rest.git.getRef({ owner, repo, ref: `heads/${base}` })).data.object.sha;
              try { await github.rest.git.createRef({ owner, repo, ref: `refs/heads/${branch}`, sha: headOid }); }
              catch (e) { if (e.status !== 422) throw e; await github.rest.git.updateRef({ owner, repo, ref: `heads/${branch}`, sha: headOid, force: true }); }

              await github.graphql(
                `mutation ($input: CreateCommitOnBranchInput!) { createCommitOnBranch(input: $input) { commit { oid } } }`,
                { input: {
                    branch: { repositoryNameWithOwner: `${owner}/${repo}`, branchName: branch },
                    message: { headline: 'chore: sync AI caller workflows' },
                    expectedHeadOid: headOid,
                    fileChanges: { additions, deletions },
                } },
              );

              let pr = (await github.rest.pulls.list({ owner, repo, state: 'open', head: `${owner}:${branch}` })).data[0];
              if (!pr) {
                pr = (await github.rest.pulls.create({ owner, repo, base, head: branch,
                  title: 'chore: sync AI caller workflows',
                  body: 'Managed by [dryvist/tofu-github](https://github.com/dryvist/tofu-github) (config/ai-callers.yml + config/workflows). Updates the AI caller chain and removes superseded legacy callers.' })).data;
              }
              core.info(`PR #${pr.number}: ${pr.html_url}`);
              if (autoMerge) {
                await github.rest.pulls.merge({ owner, repo, pull_number: pr.number, merge_method: 'squash' });
                core.info(`merged #${pr.number}`);
              }
              core.endGroup();
            }
