# CI Gate - Conditional Required Checks
#
# FRAMEWORK: Merge Gatekeeper Pattern
# ====================================
# Solves: "Required checks that only run when relevant files change"
#
# Problem: GitHub branch protection only supports "always required" or "not required"
#          Path-filtered workflows that don't run = pending forever = blocks merge
#
# Solution: Single workflow that:
# 1. Always triggers on ALL PRs (no path filters at workflow level)
# 2. Detects which file categories changed
# 3. Runs check jobs conditionally (skipped = success)
# 4. Final "Merge Gate" job aggregates all results
#
# Branch Protection: Set ONLY "Merge Gate" as required check
#
# NOTE: This repo defines the org-wide markdown-lint ruleset, so markdown is
# covered org-side — there is no per-repo markdown-lint job here. File-size
# reusables are off-limits (they live only under the personal account).
#
# Adding New Checks:
# 1. Add a filter pattern under `changes.steps.filter.with.filters`
# 2. Add a job gated on that filter output
# 3. Add the job name to `gate.needs` array and `allowed-skips`

name: CI Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # ==========================================================================
  # CHANGE DETECTION
  # ==========================================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: filter
        with:
          filters: |
            terraform:
              - '**.tf'
              - '**.tfvars'
              - '.terraform.lock.hcl'
              - '.tflint.hcl'
              - 'tests/**'
              # This workflow defines the Terraform job (tool versions, tflint
              # invocation), so a change here must re-run it -- otherwise a
              # broken tool pin merges green as SKIPPED and only fails later,
              # on someone else's .tf PR.
              - '.github/workflows/ci-gate.yml'

  # ==========================================================================
  # CONDITIONAL CHECKS
  # ==========================================================================
  terraform:
    name: Terraform
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2
      - name: OpenTofu Format
        run: tofu fmt -check
      - name: OpenTofu Init
        run: tofu init -backend=false
      - name: OpenTofu Validate
        run: tofu validate -no-color
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6
        with:
          # Pinned, never `latest`: the action is SHA-pinned but the tool it
          # installs was not, so any upstream tflint release lands here with no
          # change to this repo. On 2026-07-17 that turned every PR red -- tflint
          # >=0.61 nil-derefs verifying its plugin after GitHub removed the
          # `bundle` field from attestation responses (see .tflint.hcl).
          # v0.63.1 is the version this repo's CI has proven green.
          # Renovate holds new releases 60 days and will not auto-merge them
          # (see renovate.json) so an upstream regression cannot arrive silently.
          # renovate: datasource=github-releases depName=terraform-linters/tflint
          tflint_version: v0.63.1
      - name: TFLint
        run: tflint --init && tflint -f compact

  # ==========================================================================
  # MERGE GATE - The ONLY required check in branch protection
  # ==========================================================================
  gate:
    name: Merge Gate
    needs: [changes, terraform]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Check all results
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          allowed-skips: terraform
          jobs: ${{ toJSON(needs) }}
