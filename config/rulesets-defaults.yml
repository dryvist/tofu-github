# Default thresholds and value sets for org-wide rulesets defined in
# rulesets.tf. Read with yamldecode(file(...)) and expose as locals. No
# literal numbers, lists, or thresholds in any .tf file — keep them here so
# they're tunable without editing Terraform code, and reviewable in a single
# place.

# Existing live rulesets adopted into state. These IDs are GitHub-assigned
# identifiers, not policy settings; keeping them here avoids literals in HCL.
imports:
  org_branch_protection: "15555419"
  markdown_lint: "17062292"
  required_signatures: "17916554"

# Consumed by github_organization_ruleset.org_push_protection. Native GitHub
# push rules — enforced at the git layer without any workflow involvement.
push_protection:
  # Hard ceiling on individual file size. Any push containing a single file
  # larger than this is rejected by GitHub before it lands. Repos with a
  # legitimate need for larger files get added to the bypass actor list
  # rather than raising the org-wide ceiling.
  max_file_size_mb: 1

  # Banned file extensions, as fnmatch globs (the integrations/github provider
  # format for restricted_file_extensions). These extensions usually carry
  # credentials or keys; pushes containing files matching any of these globs
  # are rejected at the git layer. Repos that legitimately need to commit one
  # (e.g. a test fixture) put them in a bypass-allowed path or add the actor
  # to bypass.
  banned_file_extensions:
    - "*.env"
    - "*.pem"
    - "*.key"
    - "*.p12"
    - "*.pfx"

# Consumed by github_organization_ruleset.org_branch_protection — the
# non-bypassable quality gate on every repo's default branch.
branch_protection:
  # Branch name pattern enforced on every PR. Defined here so the regex
  # can change without editing rulesets.tf.
  branch_name_operator: starts_with
  branch_name_pattern: "(main|develop|feat|fix|hotfix|release|chore)"

  # Strict Conventional Commits regex. Types are the v1.0.0 spec set;
  # scope is optional and restricted to lowercase alphanumeric + hyphen;
  # `!` indicates a breaking change. Anything else fails.
  commit_message_pattern: '^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([a-z0-9\-]+\))?(!)?: .+$'

  # Merge methods allowed on PRs. Merge commits explicitly disallowed —
  # required_linear_history would reject them anyway, this just removes
  # them from the GitHub UI dropdown so contributors can't try.
  allowed_merge_methods:
    - squash
    - rebase

# Consumed by the git-flow pilot rulesets (org-gitflow-main / org-gitflow-develop
# in rulesets.tf) for repos opted in via `gitflow: true` in config/repos.yml.
# These repos run the git-flow model: develop is the integration default branch
# (feature PRs squash-merge in, direct pushes allowed, back-merges land merge
# commits) and main is the release branch (merge-commit-only PRs, no direct
# pushes) so release/hotfix merges preserve full history.
gitflow:
  # Merge methods allowed on PRs into main. Merge-commit ONLY: a release or
  # hotfix PR into main keeps the branch's commit history instead of squashing
  # or rebasing it away. squash and rebase are removed from the main UI dropdown.
  main_allowed_merge_methods:
    - merge

  # Conventional Commits OR a git-flow merge commit. Back-merges and release
  # merges land "Merge branch ..." / "Merge pull request ..." subjects that the
  # strict Conventional-Commits pattern above (commit_message_pattern) rejects,
  # so the git-flow variant adds a leading "Merge " alternation. Everything else
  # is the same v1.0.0 type set with an optional lowercase scope and `!`.
  commit_message_pattern: '^(Merge .+|(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([a-z0-9\-]+\))?(!)?: .+)$'
