# Required-check inventory — the org Merge Gate on every public, non-archived
# repo, plus any repo's own bespoke required check.
#
# required_status_checks rules match check-run context strings EXACTLY, and
# repos emit different contexts for the same logical gate depending on their
# caller shape:
#
#   gate:  `gate / Merge Gate` — the canonical thin caller (`jobs: gate:`
#          calling dryvist/.github `_ci-gate.yml`). All new adopters land here.
#   bare:  `Merge Gate` — the older inline ci-gate.yml pattern, where the
#          alls-green summary job is a top-level job. These repos migrate to
#          the thin caller over time; move each to `gate` when it does.
#   ci:    `ci / Merge Gate` — caller job id `ci` (_ansible-ci.yml consumer).
#
# A repo whose required check is NOT the org Merge Gate gets its own bucket:
#
#   astro-build: `Build & deploy` — docs-starlight's bespoke Astro build
#                (ci.yml `build` job). It is a top-level job, so it reports a
#                bare job-name context with no workflow prefix — same shape as
#                `bare` above, NOT `CI / Build & deploy` (that prefix form only
#                appears when a job CALLS a reusable workflow). Required so a
#                red build can no longer auto-merge (incident: #130).
#
# Adding a repo to a list REQUIRES its check context to be live on main first —
# a required check that never reports blocks every PR in the repo. Verify with
# a recent PR's check-run names before editing. Org rulesets apply to dryvist
# private repos too — docs-starlight is the first private entry (astro-build);
# the paid-feature gate is on secret scanning / push protection, not on
# required-check rulesets. develop branches are out of scope by design
# (required checks block direct pushes, which develop must allow).
merge_gate:
  contexts:
    gate:
      context: "gate / Merge Gate"
      repos:
        - .github
        - ai-workflows
        - cc-edge-claude-code-io
        - cc-edge-pack-template
        - cc-edge-the-mac-pack-io
        - claude-code-best-practice
        - claude-code-plugins
        - claude-code-routines
        - docs
        - homelab-contracts
        - iac-platform
        - nix-ai-open-harness
        - nix-claude-code
        - nix-devenv
        - nix-pxe-bootstrap
        - nixos-ai
        - python-template
        - raycast-smart-issue
        - tf-splunk-aws
        - tofu-aws-templates
    bare:
      context: "Merge Gate"
      repos:
        - ai-assistant-instructions
        - ansible-proxmox-apps
        - ansible-splunk
        - mlx-benchmarks
        - nix-ai
        - nix-darwin
        - nix-home
        - terraform-proxmox
        - terraform-runs-on
        - tofu-github
    ci:
      context: "ci / Merge Gate"
      repos:
        - ansible-proxmox
    astro-build:
      context: "Build & deploy"
      repos:
        - docs-starlight
