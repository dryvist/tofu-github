# MANAGED BY tofu-github (config/workflows/issue-auto-resolve.yml) — do not edit in the repo.
# New/reopened issue -> Claude triage labels it (type/size/priority + ai:ready when
# auto-resolvable) -> if ai:ready, Claude (Opus) opens a PR that resolves it. A human
# adding ai:ready, or workflow_dispatch with an issue_number, are the manual paths.
name: Issue Auto-Resolve (Claude)

on:
  issues:
    types: [opened, reopened, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to resolve"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

concurrency:
  group: issue-auto-resolve-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: false

jobs:
  triage:
    if: >-
      github.event_name == 'issues' &&
      (github.event.action == 'opened' || github.event.action == 'reopened')
    uses: dryvist/ai-workflows/.github/workflows/issue-triage.yml@v0
    secrets: inherit

  resolve:
    needs: [triage]
    if: >-
      always() &&
      (needs.triage.result == 'success' || needs.triage.result == 'skipped') &&
      !(github.event_name == 'issues' &&
        github.event.action == 'labeled' &&
        github.event.label.name != 'ai:ready')
    uses: dryvist/ai-workflows/.github/workflows/cc-issue-resolver.yml@v0
    secrets: inherit
    with:
      repo_context: ${{ vars.AI_REPO_CONTEXT }}
      extra_tools: ${{ vars.AI_EXTRA_TOOLS }}
      issue_number: ${{ github.event.issue.number || inputs.issue_number || '0' }}
